version: '3.9'

# Production variant — connects to hosted Supabase (not local)
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  app:
    build:
      context: .
      target: prod
    ports:
      - '80:80'
    environment:
      # These are baked in at build time via Vite — pass as build args
      - NODE_ENV=production
    restart: unless-stopped
