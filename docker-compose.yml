version: '3.9'

# Local dev JWT defaults — safe to commit, only used locally
# These are the standard Supabase local dev keys
x-jwt:
  JWT_SECRET: &jwt_secret ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
  ANON_KEY: &anon_key ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7kyqd6X3xu8GY3KlOzWDYIWFzDC3MYIlBRc}
  SERVICE_KEY: &service_key ${SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl196z2-SBc}

services:
  # ── Database ──────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./supabase/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: pg_isready -U postgres -h localhost
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - workout-net

  # ── Auth (GoTrue) ─────────────────────────────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.164.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:8000
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      GOTRUE_SITE_URL: http://localhost:5173
      GOTRUE_URI_ALLOW_LIST: http://localhost:5173
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_DISABLE_SIGNUP: 'false'
      GOTRUE_MAILER_AUTOCONFIRM: 'true'
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOOGLE_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: http://localhost:8000/auth/v1/callback
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:9999/health']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - workout-net

  # ── REST API (PostgREST) ──────────────────────────────────────────────────────
  rest:
    image: postgrest/postgrest:v12.2.0
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_DB_USE_LEGACY_GUCS: 'false'
    networks:
      - workout-net

  # ── App migrations — waits for auth.users to exist ───────────────────────────
  migrate:
    image: postgres:16-alpine
    depends_on:
      auth:
        condition: service_healthy
    volumes:
      - ./supabase/migrations:/migrations:ro
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    entrypoint: >
      sh -c "
        echo 'Waiting for auth.users...';
        until psql -h db -U postgres -d postgres -c 'select 1 from auth.users limit 1' > /dev/null 2>&1; do
          sleep 2;
        done;
        if psql -h db -U postgres -d postgres -c 'select 1 from public.profiles limit 1' > /dev/null 2>&1; then
          echo 'Migrations already applied, skipping.';
          exit 0;
        fi;
        echo 'Running app migrations...';
        for f in /migrations/001_initial_schema.sql /migrations/002_rls.sql /migrations/003_seed_exercises.sql /migrations/004_storage.sql; do
          echo \"  \$$f\";
          psql -h db -U postgres -d postgres --set ON_ERROR_STOP=1 -f \$$f || exit 1;
        done;
        echo 'All migrations applied.';
        psql -h db -U postgres -d postgres -c \"NOTIFY pgrst, 'reload schema';\"
      "
    networks:
      - workout-net

  # ── API Gateway (nginx) ───────────────────────────────────────────────────────
  gateway:
    image: nginx:alpine
    ports:
      - '8000:8000'
    volumes:
      - ./supabase/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth
      - rest
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8000/auth/v1/health']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - workout-net

  # ── Frontend (Vite dev server) ─────────────────────────────────────────────────
  app:
    build:
      context: .
      target: dev
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      VITE_SUPABASE_URL: http://localhost:8000
      VITE_SUPABASE_ANON_KEY: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7kyqd6X3xu8GY3KlOzWDYIWFzDC3MYIlBRc}
      VITE_SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl196z2-SBc}
    depends_on:
      gateway:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - workout-net

volumes:
  db-data:
  node_modules:

networks:
  workout-net:
    driver: bridge
