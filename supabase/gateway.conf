map $http_origin $cors_origin {
    default "";
    "~^http://localhost" $http_origin;
    "~^http://127.0.0.1" $http_origin;
}

server {
    listen 8000;

    # Auth — strip /auth/v1 prefix before proxying to GoTrue
    location /auth/v1/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, apikey, Content-Type, X-Client-Info, X-Supabase-Api-Version, Prefer, Range, accept-profile, content-profile' always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;

        proxy_pass http://auth:9999/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Authorization, apikey, Content-Type, X-Client-Info, X-Supabase-Api-Version, Prefer, Range, accept-profile, content-profile' always;
    }

    # REST API — strip /rest/v1 prefix before proxying to PostgREST
    location /rest/v1/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, apikey, Content-Type, X-Client-Info, X-Supabase-Api-Version, Prefer, Range, accept-profile, content-profile' always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        proxy_pass http://rest:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Authorization, apikey, Content-Type, X-Client-Info, X-Supabase-Api-Version, Prefer, Range, accept-profile, content-profile' always;
    }
}
